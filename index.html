<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fil Noir 2026 · learners roll call · dual audio</title>
  <!-- Tailwind + Inter refined -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0b0d17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-image: radial-gradient(circle at 100% 0%, #1f2b3f, #03050b 70%);
    }
    
    /* subtle orbs – more elegant */
    .orb-elegant {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 20% 30%, #2b4a7a, #0e1a2b);
      filter: blur(100px);
      z-index: 0;
      opacity: 0.25;
      animation: orbMove 30s infinite alternate;
    }
    .orb-elegant.left { width: 70vmax; height: 70vmax; left: -20%; top: -20%; }
    .orb-elegant.right { width: 60vmin; height: 60vmin; right: 0%; bottom: 0%; background: #2f2645; animation-duration: 40s; }
    
    @keyframes orbMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(6%, -4%) scale(1.2); }
    }
    
    /* main card — cleaner, softer dark glass, refined radius */
    .card-refined {
      background: rgba(12, 18, 28, 0.75);
      backdrop-filter: blur(18px) saturate(220%);
      -webkit-backdrop-filter: blur(18px) saturate(220%);
      border: 1px solid rgba(90, 150, 255, 0.15);
      border-radius: 3.5rem;
      box-shadow: 0 40px 80px -30px #000, 0 0 0 1px #1f3d70 inset;
      position: relative;
      z-index: 30;
    }
    
    /* countdown tiles — smoother, with better contrast */
    .tile-premium {
      background: #0f1a28;
      border-radius: 2.2rem;
      padding: 2rem 0.2rem;
      border: 1px solid #253549;
      box-shadow: 0 15px 30px -20px #000;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      text-align: center;
    }
    .tile-premium:hover {
      border-color: #4f7eb3;
      background: #132235;
      transform: translateY(-6px);
      box-shadow: 0 30px 40px -25px #1e4c9e;
    }
    
    .digit-clean {
      font-size: 4.5rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 25px #3f7bc0;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .digit-label {
      color: #99b8d4;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.8rem;
      font-weight: 400;
    }
    
    /* learners display container — elegant yet bold (no count badge) */
    .learners-premium {
      background: #0d1422;
      border: 1.5px solid #2d4670;
      border-radius: 5rem;
      padding: 1.2rem 3rem;
      box-shadow: 0 0 30px #1e3f6e, 0 0 0 1px #5f8fd0 inset;
      display: inline-block;
      transition: box-shadow 0.3s;
      max-width: 95%;
    }
    
    .learners-text-glow {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(145deg, #ffffff, #b8d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      filter: drop-shadow(0 0 20px #5f9eff);
    }
    
    @media (max-width: 640px) {
      .learners-text-glow { font-size: 1.4rem; white-space: normal; }
      .digit-clean { font-size: 3.2rem; }
      .card-refined { border-radius: 2.5rem; padding: 1.5rem; }
      .learners-premium { padding: 1rem 1.5rem; }
    }
    
    /* HYK signature — refined */
    .hyk-sleek {
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.6rem;
      background: linear-gradient(145deg, #b0d0ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      border-left: 3px solid #3b82f6;
      padding-left: 1.2rem;
    }
    
    /* final message elegant dark */
    .final-elegant {
      background: #0d1727;
      border-radius: 4rem;
      padding: 3.5rem 4rem;
      border: 1px solid #3f6a9e;
      box-shadow: 0 0 100px #1b3a5f;
      text-align: center;
      animation: fadeFinal 1s ease;
    }
    @keyframes fadeFinal {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .footer-sleek {
      border-top: 1px solid #1e2f40;
      color: #7189a6;
    }
    
    /* fade-in */
    .appear-smooth {
      animation: appear 1.5s ease forwards;
    }
    @keyframes appear {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* refined audio bar — now with track indication */
    .audio-embed {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      opacity: 0.7;
      transition: opacity 0.3s;
      background: #101b2b;
      backdrop-filter: blur(8px);
      border-radius: 60px;
      border: 1px solid #2d4670;
      padding: 8px 16px 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 25px #00000055;
    }
    .audio-embed:hover { opacity: 1; }
    .audio-embed audio {
      height: 36px;
      width: 200px;
      border-radius: 36px;
    }
    .audio-label {
      color: #a2c4f0;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 300;
      white-space: nowrap;
    }
    .track-badge {
      background: #1f3450;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #bbd6ff;
      border: 1px solid #3d6190;
    }
    @media (max-width: 650px) {
      .audio-embed { bottom: 10px; right: 10px; padding: 5px 10px; flex-wrap: wrap; gap: 5px; }
      .audio-embed audio { width: 150px; height: 32px; }
      .track-badge { font-size: 0.7rem; padding: 2px 8px; }
      .audio-label { display: none; }
    }
  </style>
</head>
<body>

  <div class="orb-elegant left"></div>
  <div class="orb-elegant right"></div>

  <div class="relative z-40 w-full max-w-5xl p-5 appear-smooth">
    <div class="card-refined p-9 md:p-13 lg:p-14">
      
      <!-- header: refined, clean -->
      <div class="flex flex-wrap items-center justify-between gap-5 mb-10">
        <span class="text-xs font-medium text-blue-400/70 tracking-[0.3em] bg-[#101b2b] px-6 py-3 rounded-full border border-blue-900/50 uppercase">Fil Noir · YouCode</span>
        <div class="flex items-center gap-5">
          <span class="text-sm text-blue-400/40">crafted by</span>
          <span class="hyk-sleek">HYK</span>
        </div>
      </div>

      <!-- main countdown area -->
      <div id="mainUI">
        <!-- title with better balance -->
        <div class="text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight">Fil Noir <span class="text-blue-400 font-light">2026</span></h1>
          <p class="text-gray-400 mt-3 text-base md:text-lg">The dark day · may 11</p>
        </div>
        
        <!-- LEARNERS DISPLAY (full name only, updates every 3 seconds) -->
        <div class="flex justify-center my-10">
          <div class="learners-premium">
            <span class="learners-text-glow" id="learnerMessage">Abdelilah Isswa</span>
          </div>
        </div>
        
        <!-- countdown tiles (4) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-7 mt-8">
          <div class="tile-premium">
            <span class="digit-clean" id="days">00</span>
            <span class="digit-label">DAYS</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="hours">00</span>
            <span class="digit-label">HOURS</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="minutes">00</span>
            <span class="digit-label">MINUTES</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="seconds">00</span>
            <span class="digit-label">SECONDS</span>
          </div>
        </div>
      </div>

      <!-- final message container (hidden) -->
      <div id="finalUI" class="hidden w-full flex justify-center py-6"></div>

      <!-- footer with YouCode mention, minimal -->
      <div class="footer-sleek mt-14 pt-8 text-center text-sm text-gray-500 flex flex-wrap items-center justify-center gap-5">
        <span>✦</span>
        <span>Fil Noir of YouCode</span>
        <span>✦</span>
        <span class="text-blue-400/80">HYK</span>
        <span>✦</span>
      </div>
    </div>
  </div>

  <!-- ✦ Dual‑track audio player: quran1.mp3 + quran2.mp3 with seamless loop ✦ -->
  <div class="audio-embed" id="dualAudioWidget">
    <span class="audio-label">Fil Noir rec.</span>
    <span class="track-badge" id="trackIndicator">quran1</span>
    <audio id="dualAudioPlayer" controls autoplay>
      <source src="sound/quran1.mp3" type="audio/mpeg" id="audioSource">
      Your browser does not support the audio element.
    </audio>
  </div>

  <script>
    (function() {
      // ---------- core countdown & learner logic (unchanged) ----------
      const targetDate = new Date(2026, 4, 11, 0, 0, 0);
      
      const mainDiv = document.getElementById('mainUI');
      const finalDiv = document.getElementById('finalUI');
      
      const daysSpan = document.getElementById('days');
      const hoursSpan = document.getElementById('hours');
      const minutesSpan = document.getElementById('minutes');
      const secondsSpan = document.getElementById('seconds');
      
      const learnerSpan = document.getElementById('learnerMessage');
      
      const learnerNames = [
        "Abdelilah Isswa", "Abderrahim Elgmouri", "Abderrazak Errifaouy", "Amine Lebrini",
        "Ayoub Houdda", "Badr Eddine Slaoui", "Bilal Bakessou", "Bouchaib El Haidi",
        "Brahim El Habchi", "Houssam YK", "Houssam Mirrou", "Houssam Largou",
        "Kaoutar Zahir", "Khadija El Haddad", "Lahcen Ait Maskour", "Mohamed Rahoumi",
        "Mohamed reda chakir", "Mouad El Alli", "Noureddine Zouana", "Olaya Azzam",
        "Saad Haimeur", "Saadia Ajbbar", "Saoui Mouna", "Taha Irhmourra", "Yassine Nmila"
      ];

      let learnerIndex = 0;
      function updateLearnerMessage() {
        if (learnerSpan && learnerNames.length > 0) {
          learnerSpan.innerText = learnerNames[learnerIndex % learnerNames.length];
          learnerIndex++;
        }
      }

      function formatTwo(n) { return n < 10 ? '0' + n : n; }
      function isExpired() { return Date.now() >= targetDate.getTime(); }

      function showFinalScreen() {
        mainDiv.classList.add('hidden');
        finalDiv.classList.remove('hidden');
        finalDiv.innerHTML = `
          <div class="final-elegant">
            <span class="text-7xl block mb-5">🌑</span>
            <h2 class="text-5xl md:text-7xl font-bold text-white">Fil Noir</h2>
            <p class="text-3xl text-blue-400 mt-2">ARRIVED</p>
            <p class="text-gray-400 mt-6 text-xl border-t border-blue-900/50 pt-6">may 11, 2026 · the moment is now</p>
            <div class="mt-8 text-blue-300/50 text-sm tracking-widest">H Y K   ·   Y O U C O D E</div>
          </div>
        `;
      }

      function updateNumbersAndMaybeFinal() {
        if (isExpired()) {
          showFinalScreen();
          return true;
        }
        const diff = targetDate - Date.now();
        daysSpan.innerText = formatTwo(Math.floor(diff / 86400000));
        hoursSpan.innerText = formatTwo(Math.floor((diff % 86400000) / 3600000));
        minutesSpan.innerText = formatTwo(Math.floor((diff % 3600000) / 60000));
        secondsSpan.innerText = formatTwo(Math.floor((diff % 60000) / 1000));
        return false;
      }

      // initial UI
      if (isExpired()) {
        showFinalScreen();
      } else {
        updateNumbersAndMaybeFinal();
        updateLearnerMessage();
        
        const timerInterval = setInterval(() => {
          if (isExpired()) {
            clearInterval(timerInterval);
            clearInterval(learnerInterval);
            showFinalScreen();
          } else {
            updateNumbersAndMaybeFinal();
          }
        }, 1000);
        
        const learnerInterval = setInterval(() => {
          if (!isExpired()) updateLearnerMessage();
          else clearInterval(learnerInterval);
        }, 3000);
      }

      // ---------- DUAL AUDIO (quran1.mp3 → quran2.mp3 → loop) ----------
      const audioPlayer = document.getElementById('dualAudioPlayer');
      const audioSource = document.getElementById('audioSource');
      const trackBadge = document.getElementById('trackIndicator');

      // list of tracks
      const tracks = [
        { src: 'sound/quran1.mp3', label: 'سورة الرحمن معاذ أيمن' },
        { src: 'sound/quran2.mp3', label: 'سورة البقرة معاذ صيام' }
      ];

      let currentTrackIndex = 0;  // start with quran1

      // function to update source and badge
      function switchToTrack(index) {
        const track = tracks[index % tracks.length];  // safe wrap
        audioSource.src = track.src;
        trackBadge.innerText = track.label;
        // reload and play (if player is not paused)
        audioPlayer.load();
        // attempt to play (autoplay may be restricted, but we try)
        audioPlayer.play().catch(e => console.log('autoplay blocked – user interaction needed'));
      }

      // event: when current track ends, move to next
      audioPlayer.addEventListener('ended', () => {
        currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
        switchToTrack(currentTrackIndex);
      });

      // optional: if browser blocks autoplay, a single user click on body will attempt to start audio
      // (helps user to start playback easily)
      document.body.addEventListener('click', function startAudioOnce() {
        if (audioPlayer.paused) {
          audioPlayer.play().catch(e => {});
        }
      }, { once: true });

      // ensure badge matches initial track (already 'quran1' from HTML)
      // but to be safe after potential delay, set it explicitly
      currentTrackIndex = 0;
      audioSource.src = 'sound/quran1.mp3';
      trackBadge.innerText = 'سورة الرحمن معاذ أيمن';
      audioPlayer.load(); // preload

      // one more gentle autoplay attempt after page load (some browsers allow if user interacted earlier)
      window.addEventListener('load', () => {
        // try to play after a tiny delay — no guarantee, but gives a chance
        setTimeout(() => {
          if (audioPlayer.paused) {
            audioPlayer.play().catch(() => {});  // silent fail
          }
        }, 800);
      });

    })();
  </script>
</body>
</html>
