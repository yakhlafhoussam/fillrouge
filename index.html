<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fil Noir 2026 · learners roll call · visual gallery</title>
  <!-- Tailwind + Inter refined -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0d17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-image: radial-gradient(circle at 100% 0%, #1f2b3f, #03050b 70%);
      overflow-x: hidden;
    }

    /* subtle orbs – more elegant */
    .orb-elegant {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 20% 30%, #2b4a7a, #0e1a2b);
      filter: blur(100px);
      z-index: 0;
      opacity: 0.25;
      animation: orbMove 30s infinite alternate;
    }

    .orb-elegant.left {
      width: 70vmax;
      height: 70vmax;
      left: -20%;
      top: -20%;
    }

    .orb-elegant.right {
      width: 60vmin;
      height: 60vmin;
      right: 0%;
      bottom: 0%;
      background: #2f2645;
      animation-duration: 40s;
    }

    @keyframes orbMove {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(6%, -4%) scale(1.2);
      }
    }

    /* main card — cleaner, softer dark glass, refined radius */
    .card-refined {
      background: rgba(12, 18, 28, 0.75);
      backdrop-filter: blur(18px) saturate(220%);
      -webkit-backdrop-filter: blur(18px) saturate(220%);
      border: 1px solid rgba(90, 150, 255, 0.15);
      border-radius: 3.5rem;
      box-shadow: 0 40px 80px -30px #000, 0 0 0 1px #1f3d70 inset;
      position: relative;
      z-index: 30;
    }

    /* countdown tiles — smoother, with better contrast */
    .tile-premium {
      background: #0f1a28;
      border-radius: 2.2rem;
      padding: 2rem 0.2rem;
      border: 1px solid #253549;
      box-shadow: 0 15px 30px -20px #000;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      text-align: center;
    }

    .tile-premium:hover {
      border-color: #4f7eb3;
      background: #132235;
      transform: translateY(-6px);
      box-shadow: 0 30px 40px -25px #1e4c9e;
    }

    .digit-clean {
      font-size: 4.5rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 25px #3f7bc0;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .digit-label {
      color: #99b8d4;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.8rem;
      font-weight: 400;
    }

    /* learners display container — elegant with image integration */
    .learners-premium {
      background: #0d1422;
      border: 1.5px solid #2d4670;
      border-radius: 5rem;
      padding: 1.2rem 2rem;
      box-shadow: 0 0 30px #1e3f6e, 0 0 0 1px #5f8fd0 inset;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transition: box-shadow 0.3s;
      max-width: 95%;
      min-width: 320px;
      position: relative;
    }

    /* All student images container - position relative for stacking */
    .student-images-container {
      position: relative;
      width: 150px;
      height: 150px;
    }

    /* Student image base style */
    .student-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 150px;
      height: 150px;
      border-radius: 100%;
      object-fit: cover;
      border: 3px solid #4f7eb3;
      box-shadow: 0 0 30px rgba(79, 126, 179, 0.6);
      background: #1f2a3a;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.9);
    }

    /* Visible image - only the current learner */
    .student-img.visible {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .student-img:hover {
      transform: scale(1.05);
      border-color: #8bbaff;
    }

    .learners-text-glow {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(145deg, #ffffff, #b8d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      filter: drop-shadow(0 0 20px #5f9eff);
    }

    @media (max-width: 640px) {
      .learners-premium {
        padding: 0.8rem 1.2rem;
        gap: 1rem;
        border-radius: 3rem;
        min-width: 260px;
      }

      .student-images-container {
        width: 100px;
        height: 100px;
      }

      .student-img {
        width: 100px;
        height: 100px;
      }

      .learners-text-glow {
        font-size: 1.2rem;
        white-space: normal;
        text-align: center;
      }

      .digit-clean {
        font-size: 3.2rem;
      }

      .card-refined {
        border-radius: 2.5rem;
        padding: 1.5rem;
      }
    }

    /* HYK signature — refined */
    .hyk-sleek {
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.6rem;
      background: linear-gradient(145deg, #b0d0ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      border-left: 3px solid #3b82f6;
      padding-left: 1.2rem;
    }

    /* final message elegant dark */
    .final-elegant {
      background: #0d1727;
      border-radius: 4rem;
      padding: 3.5rem 4rem;
      border: 1px solid #3f6a9e;
      box-shadow: 0 0 100px #1b3a5f;
      text-align: center;
      animation: fadeFinal 1s ease;
    }

    @keyframes fadeFinal {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .footer-sleek {
      border-top: 1px solid #1e2f40;
      color: #7189a6;
    }

    /* fade-in */
    .appear-smooth {
      animation: appear 1.5s ease forwards;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: translateY(25px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hide scrollbar for all elements */
    *::-webkit-scrollbar {
      display: none;
    }

    * {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>

  <div class="orb-elegant left"></div>
  <div class="orb-elegant right"></div>

  <div class="relative z-40 w-full max-w-5xl p-5 appear-smooth">
    <div class="card-refined p-9 md:p-13 lg:p-14">

      <!-- header: refined, clean -->
      <div class="flex flex-wrap items-center justify-between gap-5 mb-10">
        <span
          class="text-xs font-medium text-blue-400/70 tracking-[0.3em] bg-[#101b2b] px-6 py-3 rounded-full border border-blue-900/50 uppercase">Fil
          Noir · YouCode</span>
        <div class="flex items-center gap-5">
          <span class="text-sm text-blue-400/40">crafted by</span>
          <span class="hyk-sleek">HYK</span>
        </div>
      </div>

      <!-- main countdown area -->
      <div id="mainUI">
        <!-- title with better balance -->
        <div class="text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight">Fil Noir <span
              class="text-blue-400 font-light">2026</span></h1>
          <p class="text-gray-400 mt-3 text-base md:text-lg">The dark day · may 5</p>
        </div>

        <!-- LEARNERS DISPLAY with all images stacked, only current visible -->
        <div class="flex justify-center my-10">
          <div class="learners-premium" id="learnerContainer">
            <!-- Container for all student images -->
            <div class="student-images-container" id="studentImagesContainer"></div>
            <span class="learners-text-glow" id="learnerMessage">Abdelilah Isswa</span>
          </div>
        </div>

        <!-- countdown tiles (4) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-7 mt-8">
          <div class="tile-premium">
            <span class="digit-clean" id="days">00</span>
            <span class="digit-label">DAYS</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="hours">00</span>
            <span class="digit-label">HOURS</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="minutes">00</span>
            <span class="digit-label">MINUTES</span>
          </div>
          <div class="tile-premium">
            <span class="digit-clean" id="seconds">00</span>
            <span class="digit-label">SECONDS</span>
          </div>
        </div>
      </div>

      <!-- final message container (hidden) -->
      <div id="finalUI" class="hidden w-full flex justify-center py-6"></div>

      <!-- footer with YouCode mention -->
      <div
        class="footer-sleek mt-14 pt-8 text-center text-sm text-gray-500 flex flex-wrap items-center justify-center gap-5">
        <span>✦</span>
        <span>Fil Noir of YouCode</span>
        <span>✦</span>
        <span class="text-blue-400/80">Debuggers</span>
        <span>✦</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ---------- Target Date: May 5, 2026 ----------
      const targetDate = new Date(2026, 4, 5, 0, 0, 0);

      const mainDiv = document.getElementById('mainUI');
      const finalDiv = document.getElementById('finalUI');

      const daysSpan = document.getElementById('days');
      const hoursSpan = document.getElementById('hours');
      const minutesSpan = document.getElementById('minutes');
      const secondsSpan = document.getElementById('seconds');

      const learnerSpan = document.getElementById('learnerMessage');
      const studentImagesContainer = document.getElementById('studentImagesContainer');

      // LEARNERS LIST with image URLs
      const learnerData = [
        { name: "Abdelilah Isswa", imageUrl: "https://intranet.youcode.ma/storage/users/profile//1545-1760996241.png" },
        { name: "Abderrahim Elgmouri", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1875-1760996503.png" },
        { name: "Abderrazak Errifaouy", imageUrl: "https://intranet.youcode.ma/storage/users/profile/764-1760996158.png" },
        { name: "Amine Lebrini", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1778-1760996463.png" },
        { name: "Ayoub Houdda", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1656-1760996326.png" },
        { name: "Badr Eddine Slaoui", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1665-1760996334.png" },
        { name: "Bilal Bakessou", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1854-1760996479.png" },
        { name: "Bouchaib El Haidi", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1896-1760996532.png" },
        { name: "Brahim El Habchi", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1775-1760996461.png" },
        { name: "Houssam YK", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1720-1760996396.png" },
        { name: "Houssam Mirrou", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1756-1760996448.png" },
        { name: "Houssam Largou", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1755-1760996446.png" },
        { name: "Kaoutar Zahir", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1666-1760996336.png" },
        { name: "Khadija El Haddad", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1865-1760996489.png" },
        { name: "Lahcen Ait Maskour", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1542-1760996237.png" },
        { name: "Lamia Bane", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1856-1760996481.png" },
        { name: "Mohamed Rahoumi", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1783-1760996473.png" },
        { name: "Mohamed reda chakir", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1664-1760996332.png" },
        { name: "Mouad El Alli", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1722-1760996401.png" },
        { name: "Noureddine Zouana", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1879-1760996511.png" },
        { name: "Olaya Azzam", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1744-1760996438.png" },
        { name: "Saad Haimeur", imageUrl: "https://media.licdn.com/dms/image/v2/D4E03AQHg8vsMEiI6Fw/profile-displayphoto-crop_800_800/B4EZgof51cGwAM-/0/1753026111079?e=1775692800&v=beta&t=9-B1jmrV-5jhrzBBacM6th8IgCA7FT-QdIKY8C5Bdy0" },
        { name: "Saadia Ajbbar", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1643-1760996313.png" },
        { name: "Saoui Mouna", imageUrl: "https://intranet.youcode.ma/storage/users/profile/2053-1760996607.png" },
        { name: "Taha Irhmourra", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1774-1760996459.png" },
        { name: "Yassine Nmila", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1712-1760996382.png" },
        { name: "Zouhair Folki", imageUrl: "https://intranet.youcode.ma/storage/users/profile/1701-1760996370.png" }
      ];

      let currentDisplayIndex = 0;
      let studentImageElements = [];

      // Create all 27 img elements with their URLs (no src editing later)
      function createAllStudentImages() {
        learnerData.forEach((student, index) => {
          const img = document.createElement('img');
          img.id = `student_img_${index}`;
          img.src = student.imageUrl;
          img.alt = student.name;
          img.className = 'student-img';
          img.setAttribute('data-student-index', index);
          img.setAttribute('data-student-name', student.name);
          
          // Add to container
          studentImagesContainer.appendChild(img);
          studentImageElements.push(img);
        });
        console.log(`Created ${studentImageElements.length} student images`);
      }

      // Show only the current learner's image, hide all others
      function showCurrentLearnerImage(index) {
        // Hide all images first
        studentImageElements.forEach(img => {
          img.classList.remove('visible');
        });
        
        // Show the current image
        if (studentImageElements[index]) {
          studentImageElements[index].classList.add('visible');
        }
      }

      // Update learner display
      function updateLearnerDisplay() {
        const studentIndex = currentDisplayIndex % learnerData.length;
        const currentLearner = learnerData[studentIndex];
        
        // Update name
        learnerSpan.innerText = currentLearner.name;
        
        // Show only this student's image
        showCurrentLearnerImage(studentIndex);
        
        currentDisplayIndex++;
      }

      function formatTwo(n) { return n < 10 ? '0' + n : n; }
      function isExpired() { return Date.now() >= targetDate.getTime(); }

      function showFinalScreen() {
        mainDiv.classList.add('hidden');
        finalDiv.classList.remove('hidden');
        finalDiv.innerHTML = `
          <div class="final-elegant">
            <span class="text-7xl block mb-5">🌑</span>
            <h2 class="text-5xl md:text-7xl font-bold text-white">Fil Noir</h2>
            <p class="text-3xl text-blue-400 mt-2">ARRIVED</p>
            <p class="text-gray-400 mt-6 text-xl border-t border-blue-900/50 pt-6">may 5, 2026 · the moment is now</p>
            <div class="mt-8 text-blue-300/50 text-sm tracking-widest">H Y K   ·   Y O U C O D E</div>
          </div>
        `;
      }

      function updateNumbersAndMaybeFinal() {
        if (isExpired()) {
          showFinalScreen();
          return true;
        }
        const diff = targetDate - Date.now();
        daysSpan.innerText = formatTwo(Math.floor(diff / 86400000));
        hoursSpan.innerText = formatTwo(Math.floor((diff % 86400000) / 3600000));
        minutesSpan.innerText = formatTwo(Math.floor((diff % 3600000) / 60000));
        secondsSpan.innerText = formatTwo(Math.floor((diff % 60000) / 1000));
        return false;
      }

      // Initialize immediately - create all images and start
      function initialize() {
        // Create all 27 img elements with their URLs (no src modification)
        createAllStudentImages();
        
        if (isExpired()) {
          showFinalScreen();
          return;
        }

        // Start countdown
        updateNumbersAndMaybeFinal();
        
        // Display first student (image and name)
        const firstStudent = learnerData[0];
        learnerSpan.innerText = firstStudent.name;
        showCurrentLearnerImage(0);
        currentDisplayIndex = 1;

        // Timer: update countdown every second
        const timerInterval = setInterval(() => {
          if (isExpired()) {
            clearInterval(timerInterval);
            clearInterval(learnerInterval);
            showFinalScreen();
          } else {
            updateNumbersAndMaybeFinal();
          }
        }, 1000);

        // Rotate learner (name + image) every 3 seconds
        const learnerInterval = setInterval(() => {
          if (!isExpired()) {
            updateLearnerDisplay();
          } else {
            clearInterval(learnerInterval);
          }
        }, 3000);
      }

      // Start immediately when page loads
      initialize();
    })();
  </script>
</body>

</html>
