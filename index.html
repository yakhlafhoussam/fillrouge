<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fill Rouge 2026 · dark & crazy says</title>
  <!-- Tailwind + Inter for clean typography -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: #0a0c12;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      background-image: radial-gradient(circle at 15% 30%, #1e2a3a 0%, #030507 90%);
    }
    
    /* subtle animated orbs – dark but with depth */
    .dark-orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2f4b7c, #0f1a2f);
      filter: blur(90px);
      z-index: 0;
      opacity: 0.3;
      animation: darkFloat 25s infinite alternate;
    }
    .orb-left {
      width: 60vmax; height: 60vmax; left: -20%; top: -20%;
      background: #1d3b5c;
    }
    .orb-right {
      width: 50vmin; height: 50vmin; right: 0%; bottom: 0%;
      background: #3c2b5c;
      filter: blur(120px);
      animation-duration: 30s;
    }
    @keyframes darkFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
      100% { transform: translate(5%, 5%) scale(1.3); opacity: 0.4; }
    }
    
    /* main card — simple, dark glass, minimal */
    .dark-card {
      background: rgba(10, 15, 25, 0.7);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border: 1px solid rgba(80, 140, 255, 0.15);
      border-radius: 3rem;
      box-shadow: 0 30px 60px -20px #000000, 0 0 0 1px #1e3a5f inset;
      position: relative;
      z-index: 20;
    }
    
    /* countdown tiles — flat dark, minimal, subtle */
    .tile-dark-simple {
      background: #0f172a;
      border-radius: 2rem;
      padding: 1.8rem 0.5rem;
      border: 1px solid #1e293b;
      box-shadow: 0 10px 20px -10px #000000;
      transition: border 0.2s, transform 0.2s;
      text-align: center;
    }
    .tile-dark-simple:hover {
      border-color: #3b82f6;
      transform: translateY(-4px);
      background: #131f33;
    }
    
    .digit-light {
      font-size: 4.5rem;
      font-weight: 700;
      color: #f0f4ff;
      text-shadow: 0 0 15px #3b82f660;
      line-height: 1;
    }
    .digit-label {
      color: #94a3b8;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      display: block;
    }
    
    /* crazy says container — simple but bold */
    .crazy-says-box {
      background: #0b1424;
      border: 1px solid #3b82f6;
      border-radius: 4rem;
      padding: 1.2rem 2.5rem;
      box-shadow: 0 0 30px #1e3a8a80;
      display: inline-block;
      transition: box-shadow 0.3s;
      max-width: 90%;
    }
    
    .crazy-says-text {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(145deg, #ffffff, #b3d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 640px) {
      .crazy-says-text { font-size: 1.3rem; white-space: normal; }
      .digit-light { font-size: 3.2rem; }
    }
    
    /* HYK / YouCode signature — simple but classy dark */
    .signature-dark {
      color: #5f7fbf;
      font-weight: 300;
      letter-spacing: 0.5rem;
      font-size: 1.4rem;
      border-left: 3px solid #3b82f6;
      padding-left: 1.2rem;
    }
    
    /* final message clean dark */
    .final-simple {
      background: #0f1a2b;
      border-radius: 4rem;
      padding: 3rem 4rem;
      border: 1px solid #3b82f6;
      box-shadow: 0 0 100px #1e3a8a;
      text-align: center;
    }
    
    .footer-dark {
      border-top: 1px solid #1e2a3a;
      color: #4b5e77;
    }
    
    /* fade in */
    .fade-dark {
      animation: fadeDark 1.4s ease forwards;
    }
    @keyframes fadeDark {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="dark-orb orb-left"></div>
  <div class="dark-orb orb-right"></div>

  <div class="relative z-30 w-full max-w-5xl p-5 fade-dark">
    <div class="dark-card p-8 md:p-12">
      
      <!-- header: simple, integrated -->
      <div class="flex items-center justify-between flex-wrap gap-4 mb-8">
        <span class="text-sm font-light text-blue-300/50 tracking-widest bg-[#0f1a2f] px-6 py-2 rounded-full border border-blue-900">#FILLROUGE2026</span>
        <div class="flex items-center gap-4">
          <span class="text-blue-400/40 text-sm">built by</span>
          <span class="signature-dark">HYK</span>
        </div>
      </div>

      <!-- main countdown section -->
      <div id="mainCountdown">
        <!-- title -->
        <div class="text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-white">Fill Rouge <span class="text-blue-400 font-light">2026</span></h1>
          <p class="text-gray-400 mt-3 text-lg">dark focus · may 11</p>
        </div>
        
        <!-- crazy says widget (changes every second) -->
        <div class="flex justify-center my-8">
          <div class="crazy-says-box">
            <span class="crazy-says-text" id="crazySaysSpan">🔥 INITIALIZING CHAOS 🔥</span>
          </div>
        </div>
        
        <!-- countdown tiles (simple dark) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mt-8">
          <div class="tile-dark-simple">
            <span class="digit-light" id="days">00</span>
            <span class="digit-label">DAYS</span>
          </div>
          <div class="tile-dark-simple">
            <span class="digit-light" id="hours">00</span>
            <span class="digit-label">HOURS</span>
          </div>
          <div class="tile-dark-simple">
            <span class="digit-light" id="minutes">00</span>
            <span class="digit-label">MINUTES</span>
          </div>
          <div class="tile-dark-simple">
            <span class="digit-light" id="seconds">00</span>
            <span class="digit-label">SECONDS</span>
          </div>
        </div>
      </div>

      <!-- final message container (hidden) -->
      <div id="finalMessageDark" class="hidden w-full flex justify-center py-6"></div>

      <!-- footer simple -->
      <div class="footer-dark mt-12 pt-6 text-center text-sm text-gray-500 flex items-center justify-center gap-4 flex-wrap">
        <span>✦</span>
        <span>fill rouge of youcode</span>
        <span>✦</span>
        <span class="text-blue-400/70">HYK</span>
        <span>✦</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // target: May 11, 2026
      const targetDate = new Date(2026, 4, 11, 0, 0, 0);
      
      const mainDiv = document.getElementById('mainCountdown');
      const finalDiv = document.getElementById('finalMessageDark');
      
      const daysSpan = document.getElementById('days');
      const hoursSpan = document.getElementById('hours');
      const minutesSpan = document.getElementById('minutes');
      const secondsSpan = document.getElementById('seconds');
      
      const crazySpan = document.getElementById('crazySaysSpan');
      
      // crazy phrases array — wild, fun, dark humor, second by second
      const crazyPhrases = [
        "👾 SYSTEM OVERLOAD 👾", "🌙 NIGHTMARE FUEL", "💀 TIME IS FLEETING", "🌀 CHAOS THEORY", 
        "🔥 BURN THE CLOCK", "🧩 REALITY GLITCH", "🎭 MASQUERADE OF SECONDS", "🕷️ SPIDER TICKING",
        "🌑 DARK WHISPERS", "⚡ SHOCK EVERY SECOND", "💧 TEARS OF JOY", "👁️ EYE OF THE STORM",
        "🧠 BRAIN FREEZE", "🤖 ROBOT REBELLION", "🎸 AIR GUITAR RIFT", "🦇 BAT SIGNAL",
        "🕯️ CANDLE IN THE WIND", "🔮 CRYSTAL BALL SAYS", "🌪️ TORNADO OF THOUGHT", "💥 COLLISION COURSE",
        "🎪 FREAK SHOW", "🃏 JOKER'S LAUGH", "🧪 EXPERIMENT #2026", "🔊 LOUD SILENCE",
        "🎲 ROLL THE DICE", "♠️ ACE OF DARKNESS", "🍷 BLOOD RED", "🗝️ KEY TO NOWHERE",
        "🕳️ RABBIT HOLE", "🧬 MUTATION", "🔦 FLASHLIGHT FEAST", "🎇 QUASAR",
        "🧨 DYNAMITE MIND", "🩸 BLEEDING EDGE", "🕰️ TEMPORAL ANOMALY", "🌌 VOID GAZING"
      ];

      function randomCrazy() {
        return crazyPhrases[Math.floor(Math.random() * crazyPhrases.length)];
      }

      function formatTwo(n) { return n < 10 ? '0' + n : n; }

      function isPast() { return Date.now() >= targetDate.getTime(); }

      function showFinalDark() {
        mainDiv.classList.add('hidden');
        finalDiv.classList.remove('hidden');
        finalDiv.innerHTML = `
          <div class="final-simple">
            <span class="text-7xl block mb-4">🌑</span>
            <h2 class="text-5xl md:text-7xl font-bold text-white">FILL ROUGE</h2>
            <p class="text-3xl text-blue-400 mt-2">ARRIVED</p>
            <p class="text-gray-400 mt-5 text-xl border-t border-blue-900 pt-6">may 11, 2026 · the moment is now</p>
            <div class="mt-8 text-blue-300/60 text-sm">built by HYK · youcode</div>
          </div>
        `;
      }

      function updateDarkCountdown() {
        if (isPast()) {
          showFinalDark();
          return true;
        }
        
        const now = Date.now();
        const diff = targetDate - now;
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        
        daysSpan.innerText = formatTwo(days);
        hoursSpan.innerText = formatTwo(hours);
        minutesSpan.innerText = formatTwo(mins);
        secondsSpan.innerText = formatTwo(secs);
        
        // EVERY SECOND: new crazy says
        if (crazySpan) {
          crazySpan.innerText = randomCrazy();
        }
        return false;
      }

      // initial
      if (isPast()) {
        showFinalDark();
      } else {
        updateDarkCountdown();
        const interval = setInterval(() => {
          if (isPast()) {
            clearInterval(interval);
            showFinalDark();
          } else {
            updateDarkCountdown();
          }
        }, 1000);
      }
    })();
  </script>
</body>
</html>
